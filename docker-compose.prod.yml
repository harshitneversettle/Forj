version: "3.8"
services:
  backend:
    container_name: forj_backend_prod
    image: harshitneversettle/forj-backend:prod
    ports:
      - 3001:3001
    env_file: ./Backend/.env
    environment:
      - DATABASE_URL:${DATABASE_URL}
    restart: always

  frontend:
    container_name: forj_frontend_prod
    image: harshitneversettle/forj-backend:prod
    depends_on:
      - backend
    ports:
      - 80:80
    restart: always
